# Builds, scans, signs and publishes the docker-ubuntu base + java images to GHCR.
# The go image is built locally only (it needs operator GPG/PAT secrets).

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      images: ${{ steps.filter.outputs.images }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            images:
              - 'base/**'
              - 'java/**'
              - '.hadolint.yaml'
              - '.github/workflows/main.yml'

  static-check:
    needs: changes
    if: needs.changes.outputs.images == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          recursive: true
          config: .hadolint.yaml
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

  build:
    needs: [changes, static-check]
    if: needs.changes.outputs.images == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless signing
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Compute owner and version
        run: |
          echo "OWNER_LC=${OWNER,,}" >> "$GITHUB_ENV"
          echo "UBUNTU_VERSION=$(awk -F':= ' '/^UBUNTU_VERSION/{print $2}' Makefile)" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build base then java with plain `docker build` (BuildKit). java's
      # `FROM ghcr.io/.../docker-ubuntu-base:24.04` resolves the just-built base
      # from the local image store — no registry pull, so PRs build without auth.
      - name: Build base + java images
        run: |
          BASE="${REGISTRY}/${OWNER_LC}/docker-ubuntu-base"
          JAVA="${REGISTRY}/${OWNER_LC}/docker-ubuntu-java"
          DOCKER_BUILDKIT=1 docker build --build-arg UBUNTU_VERSION="${UBUNTU_VERSION}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            -t "${BASE}:${UBUNTU_VERSION}" ./base
          DOCKER_BUILDKIT=1 docker build --build-arg UBUNTU_VERSION="${UBUNTU_VERSION}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            -t "${JAVA}:${UBUNTU_VERSION}" ./java

      - name: Trivy image scan (base)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          # Gate on OS-package CVEs (apt-controlled) + secret scanning. Pinned-latest
          # third-party CLI tool binaries carry upstream transitive Go-dep CVEs that
          # aren't fixable at build time, so vuln scanning is scoped to `os`.
          image-ref: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/docker-ubuntu-base:${{ env.UBUNTU_VERSION }}
          vuln-type: os
          scanners: vuln,secret
          skip-dirs: '**/google-cloud-sdk/platform/gsutil/third_party'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy image scan (java)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/docker-ubuntu-java:${{ env.UBUNTU_VERSION }}
          vuln-type: os
          scanners: vuln,secret
          skip-dirs: '**/google-cloud-sdk/platform/gsutil/third_party'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Push images (tag + latest + sha)
        if: github.event_name != 'pull_request'
        run: |
          BASE="${REGISTRY}/${OWNER_LC}/docker-ubuntu-base"
          JAVA="${REGISTRY}/${OWNER_LC}/docker-ubuntu-java"
          SHA="sha-${GITHUB_SHA::7}"
          for img in "$BASE" "$JAVA"; do
            docker tag "${img}:${UBUNTU_VERSION}" "${img}:latest"
            docker tag "${img}:${UBUNTU_VERSION}" "${img}:${SHA}"
            docker push "${img}:${UBUNTU_VERSION}"
            docker push "${img}:latest"
            docker push "${img}:${SHA}"
          done
          {
            echo "BASE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${BASE}:${UBUNTU_VERSION}" | cut -d@ -f2)"
            echo "JAVA_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${JAVA}:${UBUNTU_VERSION}" | cut -d@ -f2)"
          } >> "$GITHUB_ENV"

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign base + java by digest (keyless)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes "${REGISTRY}/${OWNER_LC}/docker-ubuntu-base@${BASE_DIGEST}"
          cosign sign --yes "${REGISTRY}/${OWNER_LC}/docker-ubuntu-java@${JAVA_DIGEST}"

      - name: Generate SBOM (base)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/docker-ubuntu-base:${{ env.UBUNTU_VERSION }}
          format: spdx-json
          artifact-name: sbom-base.spdx.json

  ci-pass:
    # Single required status check for branch protection / rulesets.
    if: always()
    needs: [changes, static-check, build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs passed
        run: |
          results='${{ needs.changes.result }} ${{ needs.static-check.result }} ${{ needs.build.result }}'
          echo "results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "A required job did not pass."; exit 1
            fi
          done
          echo "All required jobs passed (or were skipped)."
